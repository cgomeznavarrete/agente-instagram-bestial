name: Publicar contenido programado

on:
  schedule:
    # Preview+publicación 12pm Colombia (UTC-5):
    # Dispara a las 11:30am COL (16:30 UTC) → preview llega 30 min antes de publicar
    - cron: '30 16 * * *'
    # Preview+publicación 7pm Colombia (UTC-5):
    # Dispara a las 6:30pm COL (23:30 UTC) → preview llega 30 min antes de publicar
    - cron: '30 23 * * *'

  workflow_dispatch:
    inputs:
      forzar:
        description: 'Publicar ahora sin verificar horario (true/false)'
        required: false
        default: 'false'
      tipo:
        description: 'Tipo a publicar manualmente (post/reel/story/carrusel)'
        required: false
        default: 'reel'

# Solo una instancia a la vez
concurrency:
  group: publicar-programado
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Publicar según horario
        run: |
          FORZAR="${{ github.event.inputs.forzar }}"
          TIPO="${{ github.event.inputs.tipo }}"
          if [ "$FORZAR" = "true" ]; then
            python main.py publicar-programado --forzar --tipo "${TIPO:-reel}"
          else
            python main.py publicar-programado
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Guardar biblioteca actualizada
        if: always()
        run: |
          git config --global user.email "agente@salsasbestial.com"
          git config --global user.name "Agente Bestial"
          git add datos/biblioteca.json datos/archivos_publicados.json || true
          git commit -m "chore: biblioteca post-publicacion" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
