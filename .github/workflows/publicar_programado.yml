name: Publicar contenido programado

on:
  schedule:
    # 12pm Colombia (UTC-5) = 17:00 UTC — slot mediodía
    - cron: '0 17 * * *'
    # 7pm Colombia (UTC-5) = 00:00 UTC del día siguiente — slot noche
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo a publicar manualmente (post/reel/story)'
        required: false
        default: ''

# Solo una instancia a la vez
concurrency:
  group: publicar-programado
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Publicar según horario
        run: python main.py publicar-programado
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Guardar biblioteca actualizada
        if: always()
        run: |
          git config --global user.email "agente@salsasbestial.com"
          git config --global user.name "Agente Bestial"
          git add datos/biblioteca.json datos/archivos_publicados.json || true
          git commit -m "chore: biblioteca post-publicacion" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
