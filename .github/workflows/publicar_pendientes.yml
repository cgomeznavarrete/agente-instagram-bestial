name: Publicar contenido pendiente

on:
  # DESHABILITADO — workflow legacy reemplazado por publicar_programado.yml
  # El comando publicar_pendientes usa arquitectura antigua (Publicador/memoria).
  # Mantener el archivo para referencia histórica.
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Publicar entradas aprobadas
        run: python main.py publicar_pendientes
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Guardar historial actualizado
        run: |
          git config --global user.email "agente@salsasbestial.com"
          git config --global user.name "Agente Bestial"
          git add datos/historial_publicaciones.json datos/calendario_semanal.json
          git commit -m "chore: publicaciones $(date +%Y-%m-%d)" || true
          git push
